<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Nào :))</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: #f8fafc; /* Màu nền sáng hơn một chút để nổi bật Card */
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        -webkit-font-smoothing: antialiased;
    }

    /* Card: Giảm độ bo góc một chút (20px) và dùng Border mảnh hơn */
    .glass-card {
        background: #ffffff;
        border: 1px solid #e2e8f0; 
        border-radius: 20px; 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Khi đã điểm danh: Màu xanh Slate hiện đại thay vì xanh dương quá tươi */
    .card-done {
        background: #f0f9ff;
        border-color: #3b82f6;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1);
    }

    /* Nút bấm: Dùng Flat Design (phẳng) có chiều sâu khi Hover */
    .btn-checkin {
        background: #0f172a; /* Màu Navy đen - nhìn cực kỳ chuyên nghiệp */
        color: white;
        box-shadow: 0 4px 14px 0 rgba(15, 23, 42, 0.3);
        transition: all 0.2s ease;
    }

    .btn-checkin:hover:not(:disabled) {
        background: #1e293b;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(15, 23, 42, 0.2);
    }
    
    .btn-checkin:active:not(:disabled) {
        transform: translateY(1px);
    }

    .btn-checkin:disabled { 
        background: #cbd5e1; 
        box-shadow: none; 
        color: #94a3b8;
        cursor: not-allowed;
    }

    /* Giữ nguyên Grid của bạn để không bị lệch Layout */
    .responsive-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        width: 100%;
    }

    @media (min-width: 768px) {
        .responsive-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .timer-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 50px;
    }

    /* Typography tinh chỉnh: giúp chữ trông "đắt tiền" hơn */
    h1 { letter-spacing: -0.05em; }
    .timer-unit span { font-variant-numeric: tabular-nums; }
</style>
</head>
<body class="p-6">
    <div id="loading-bar" class="fixed top-0 left-0 h-1 bg-blue-600 transition-all z-50" style="width: 0%"></div>

    <header class="w-full max-w-4xl mb-12 text-center">
        <h1 class="text-4xl font-black tracking-tighter uppercase mb-8 text-slate-900">
            DẬY HỌC <span class="text-blue-600">ĐÊ!!</span>
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
            <div class="glass-card p-6 flex flex-col justify-center border-b-4 border-b-blue-500">
                <div id="countdown-full" class="flex justify-center gap-2 text-3xl font-extrabold text-slate-800 tracking-tighter">
                    <div class="timer-unit"><span id="days">00</span><p class="text-[13px] font-bold uppercase text-slate-400">Ngày</p></div>
                    <span class="pt-1 text-blue-300">:</span>
                    <div class="timer-unit"><span id="hours">00</span><p class="text-[13px] font-bold uppercase text-slate-400">Giờ</p></div>
                    <span class="pt-1 text-blue-300">:</span>
                    <div class="timer-unit"><span id="mins">00</span><p class="text-[13px] font-bold uppercase text-slate-400">Phút</p></div>
                    <span class="pt-1 text-blue-300">:</span>
                    <div class="timer-unit"><span id="secs">00</span><p class="text-[13px] font-bold uppercase text-slate-400">Giây</p></div>
                </div>
            </div>
            <button id="btn-checkin" onclick="doCheckIn()" class="btn-checkin py-5 rounded-3xl font-black text-2xl text-white transition-all active:scale-95 hover:brightness-110">
                ĐIỂM DANH 🔥
            </button>
        </div>
    </header>

    <main class="w-full max-w-6xl">
        <div id="member-list" class="responsive-grid"></div>

    </main>

    <div id="login-screen" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter text-white mb-8">Dậy Học</h2>
            <div class="glass-card p-10 bg-white border-white shadow-2xl">
                <input type="password" id="pass-input" placeholder="MÃ" class="w-full bg-transparent border-b-4 border-slate-100 p-4 text-center text-5xl focus:border-blue-500 outline-none text-slate-900 tracking-[0.2em] mb-10 font-black">
                <button onclick="checkLogin()" class="btn-checkin w-full py-5 rounded-2xl font-extrabold text-white uppercase tracking-widest text-lg">Bắt đầu ngay</button>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://bbidkpycatwtnbgeasyw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiaWRrcHljYXR3dG5iZ2Vhc3l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjgwNDUsImV4cCI6MjA4OTg0NDA0NX0.nzRA3Me2fIch57uXzcAq5hbF9navhGw97-ykQBvdrDw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const START_DATE = new Date("2026-03-25T00:00:00");
    const DEADLINE = new Date("2026-06-10T23:59:59");
    let membersArr = []; 
    let currentUser = null;

    async function loadData() {
        try {
            const { data, error } = await supabaseClient.from('members').select('*').limit(4);
            if (error) throw error;
            membersArr = data;
            renderList();
        } catch (e) { console.error(e); }
    }

function renderList() {
    const list = document.getElementById('member-list');
    list.innerHTML = "";
    const now = new Date();
    
    // Tính số ngày tính từ ngày bắt đầu đến thời điểm hiện tại
    const diffTime = now - START_DATE;
    
    // currentDayIndex: Ngày thứ bao nhiêu kể từ khi bắt đầu (Ngày 1, Ngày 2...)
    const currentDayIndex = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    membersArr.forEach((m) => {
        const doneArr = Array.isArray(m.done) ? m.done : [];
        const isActiveToday = doneArr.includes(currentDayIndex);
        
        let xCount = 0;
        // Chạy vòng lặp từ ngày 1 đến ngày hiện tại (currentDayIndex)
        for (let i = 1; i <= currentDayIndex; i++) {
            // Nếu ngày i chưa có trong mảng điểm danh -> tính là 1 lỗi ❌
            if (!doneArr.includes(i)) {
                xCount++;
            }
        }

        const card = document.createElement('div');
        card.className = `glass-card p-8 flex flex-col items-center justify-center gap-6 ${isActiveToday ? 'card-done' : ''}`;
        card.innerHTML = `
            <div class="text-[18px] font-black uppercase tracking-widest text-slate-800">${m.name}</div>
            <div class="flex flex-col gap-3 w-full">
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl px-6 border border-slate-200">
                    <span class="text-2xl">🔥</span>
                    <span class="text-3xl font-black text-orange-600">${m.streak || 0}</span>
                </div>
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl px-6 border border-slate-200">
                    <span class="text-2xl">❌</span>
                    <span class="text-3xl font-black text-red-600">${xCount}</span>
                </div>
            </div>
        `;
        list.appendChild(card);
    });
}

    function updateCountdown() {
        const diff = DEADLINE - new Date();
        if (diff <= 0) return;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById('days').innerText = String(d).padStart(2, '0');
        document.getElementById('hours').innerText = String(h).padStart(2, '0');
        document.getElementById('mins').innerText = String(m).padStart(2, '0');
        document.getElementById('secs').innerText = String(s).padStart(2, '0');
    }

    function checkLogin() {
        const pass = document.getElementById('pass-input')?.value.trim();
        const user = membersArr.find(m => String(m.id) === pass);
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            setInterval(updateCountdown, 1000);
            updateCountdown();
            checkTime();
        } else { alert("Mật mã sai!"); }
    }

    async function doCheckIn() {
        if (!currentUser) return;
        const dayIndex = Math.ceil((new Date() - START_DATE) / (1000 * 60 * 60 * 24));
        if (dayIndex <= 0) return alert("Chưa đến ngày bắt đầu!");
        const { error } = await supabaseClient.from('members').update({ 
            done: [...(currentUser.done || []), dayIndex], 
            streak: (currentUser.streak || 0) + 1 
        }).eq('id', currentUser.id);
        if (!error) { await loadData(); alert("Xong! 🔥"); }
    }

function checkTime() {
    if (!currentUser) return; // Nếu chưa đăng nhập thì không làm gì cả

    const now = new Date();
    const diffTime = now - START_DATE;
    const currentDayIndex = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    // Lấy dữ liệu mới nhất của user từ membersArr (đã được load lại sau khi điểm danh)
    const userInApp = membersArr.find(m => m.id === currentUser.id);
    const doneArr = userInApp ? (userInApp.done || []) : [];
    const hasDoneToday = doneArr.includes(currentDayIndex);

    const totalM = now.getHours() * 60 + now.getMinutes();
    const isOnTime = totalM >= 240 && totalM <= 315; // 4:00 - 5:15
    
    const btn = document.getElementById('btn-checkin');

    if (hasDoneToday) {
        btn.disabled = true;
        btn.innerText = "ĐÃ ĐIỂM DANH ✅";
        btn.classList.replace('btn-checkin', 'bg-slate-200'); // Đổi màu nút cho đẹp
    } else if (!isOnTime) {
        btn.disabled = true;
        btn.innerText = "CHƯA TỚI GIỜ";
        btn.style.backgroundColor = ""; // Reset về mặc định nếu cần
    } else {
        btn.disabled = false;
        btn.innerText = "ĐIỂM DANH 🔥";
        btn.classList.add('btn-checkin');
    }
}
    window.onload = () => { loadData(); setInterval(checkTime, 15000); };
</script>
</body>
</html>
