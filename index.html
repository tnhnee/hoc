<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Study Bàn 1 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .sticky-name { 
            position: sticky; left: 0; z-index: 100; 
            background: #020617; min-width: 120px; padding: 15px;
            border-right: 2px solid #3b82f6;
        }
        .cell { 
            min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            font-family: 'JetBrains Mono', monospace; border-radius: 12px; font-size: 14px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2); flex-shrink: 0; transition: 0.3s;
        }
        .cell-done { 
            background: linear-gradient(135deg, #22c55e, #16a34a); color: white !important; 
            border: none; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); 
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .fire-anim { animation: glow-fire 1.5s infinite alternate; }
        @keyframes glow-fire { from { filter: drop-shadow(0 0 2px #f97316); transform: scale(1); } to { filter: drop-shadow(0 0 8px #f97316); transform: scale(1.1); } }
        .btn-main { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .btn-main:disabled { background: #1e293b; color: #64748b; opacity: 0.5; cursor: not-allowed; }
        #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: #3b82f6; width: 0%; z-index: 999; transition: 0.3s; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="loading-bar"></div>
    <header class="p-6 flex flex-col gap-4">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tighter italic">BÀN 1 <span class="text-blue-500">STUDY</span></h1>
                <p id="sync-status" class="text-[9px] uppercase mt-1 tracking-widest text-slate-500 italic font-bold">Connecting JSONBin...</p>
            </div>
            <div class="bg-slate-900 border border-white/5 rounded-2xl p-3 text-center">
                <div id="countdown-num" class="text-2xl font-black text-blue-400">--</div>
                <div class="text-[7px] uppercase font-bold text-slate-600">Ngày tới 11/06</div>
            </div>
        </div>
        <button id="btn-checkin" onclick="doCheckIn()" class="btn-main w-full py-4 rounded-2xl font-bold text-lg tracking-widest transition-all active:scale-95 text-white">
            ĐIỂM DANH 🔥
        </button>
    </header>

    <div class="flex justify-between px-6 mb-2">
        <button onclick="scrollTable(-150)" class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-xl shadow-lg border border-white/5"> ‹ </button>
        <button onclick="scrollTable(150)" class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-xl shadow-lg border border-white/5"> › </button>
    </div>

    <main class="flex-1 overflow-hidden">
        <div class="h-full overflow-x-auto px-4" id="table-container" style="scroll-behavior: smooth;">
            <table class="w-full border-separate border-spacing-y-4">
                <tbody id="main-table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="login-screen" class="fixed inset-0 bg-[#020617] z-[200] flex items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-3xl font-black italic mb-2 uppercase tracking-tighter">Elite <span class="text-blue-500">Club</span></h2>
            <p class="text-slate-500 text-[10px] tracking-[0.4em] uppercase mb-8">Kỷ luật tạo nên sự khác biệt</p>
            <input type="password" id="pass-input" placeholder="MẬT MÃ" class="w-full bg-slate-900 border border-white/10 p-5 rounded-2xl text-center text-3xl mb-4 focus:border-blue-500 outline-none text-white tracking-[0.5em]">
            <button onclick="checkLogin()" class="btn-main w-full py-5 rounded-2xl font-black text-lg text-white shadow-xl shadow-blue-900/20">BẮT ĐẦU</button>
        </div>
    </div>

<script>
    const BIN_ID = "69c14b1cc3097a1dd5506616";
    const MASTER_KEY = "$2a$10$rsdjCcBtsmCWjdnpmLGRfuuT7om1szfnhfvSFBfyP5DPeBH3n/9CK";
    const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const START_DATE = new Date("2026-03-23");
    const DEADLINE = new Date("2026-06-11");
    const TOTAL_DAYS = Math.ceil((DEADLINE - START_DATE) / (1000 * 60 * 60 * 24));
    
    let members = {};
    let currentUser = null;

    // 1. Tải dữ liệu và KIỂM TRA ĐĂNG NHẬP TỰ ĐỘNG
    async function loadData() {
        document.getElementById('loading-bar').style.width = '50%';
        try {
            const res = await fetch(`${BASE_URL}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY }
            });
            const data = await res.json();
            members = data.record;
            renderTable();
            document.getElementById('sync-status').innerText = "CLOUD ONLINE ✅";
            
            // TỰ ĐỘNG ĐĂNG NHẬP NẾU ĐÃ LƯU
            const savedPass = localStorage.getItem('user_pass');
            if (savedPass && members[savedPass]) {
                currentUser = savedPass;
                document.getElementById('login-screen').style.display = 'none';
                updateCountdown();
                checkTime();
            }

            document.getElementById('loading-bar').style.width = '100%';
            setTimeout(() => document.getElementById('loading-bar').style.width = '0', 500);
        } catch (e) {
            document.getElementById('sync-status').innerText = "LỖI KẾT NỐI! ❌";
        }
    }

    // 2. Hàm đăng nhập (Có lưu lại mật mã)
    function checkLogin() {
        const pass = document.getElementById('pass-input').value;
        if (members[pass]) {
            currentUser = pass;
            // LƯU VÀO TRÌNH DUYỆT
            localStorage.setItem('user_pass', pass); 
            document.getElementById('login-screen').style.display = 'none';
            updateCountdown();
            checkTime();
        } else { 
            alert("Mật mã sai!"); 
        }
    }

    // 3. Hàm đăng xuất (Nếu cần thoát ra nhập mã khác)
    function logout() {
        localStorage.removeItem('user_pass');
        location.reload();
    }

    async function syncToCloud() {
        document.getElementById('loading-bar').style.width = '50%';
        try {
            await fetch(BASE_URL, {
                method: 'PUT',
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": MASTER_KEY
                },
                body: JSON.stringify(members)
            });
            document.getElementById('loading-bar').style.width = '100%';
            setTimeout(() => document.getElementById('loading-bar').style.width = '0', 500);
        } catch (e) { alert("Lỗi đồng bộ!"); }
    }

    function renderTable() {
        const body = document.getElementById('main-table-body');
        body.innerHTML = "";
        Object.keys(members).forEach(id => {
            const m = members[id];
            let cellsHtml = "";
            for(let i=1; i<=TOTAL_DAYS; i++) {
                let status = (m.done && m.done.includes(i)) ? "cell-done" : "";
                cellsHtml += `<div class="cell ${status} ml-2">${i}</div>`;
            }
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="sticky-name">
                    <div class="text-[14px] font-bold text-white uppercase">${m.name}</div>
                    <div class="text-[11px] text-orange-500 font-black mt-1 ${m.streak > 0 ? 'fire-anim' : 'opacity-20'}">🔥 ${m.streak}</div>
                </td>
                <td class="flex py-1">${cellsHtml}</td>
            `;
            body.appendChild(row);
        });
    }

    async function doCheckIn() {
        const now = new Date();
        const dayIndex = Math.ceil((now - START_DATE) / (1000 * 60 * 60 * 24));
        if (dayIndex <= 0) return alert("Chưa đến ngày bắt đầu!");
        
        if (!members[currentUser].done) members[currentUser].done = [];
        
        if (!members[currentUser].done.includes(dayIndex)) {
            members[currentUser].done.push(dayIndex);
            members[currentUser].streak = (members[currentUser].streak || 0) + 1;
            renderTable();
            await syncToCloud();
            alert(`Thành công! Streak: ${members[currentUser].streak} 🔥`);
        } else { 
            alert("Bạn đã điểm danh hôm nay rồi!"); 
        }
    }

    function updateCountdown() {
        const diff = DEADLINE - new Date();
        document.getElementById('countdown-num').innerText = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
    }

    function scrollTable(amt) { document.getElementById('table-container').scrollLeft += amt; }

    function checkTime() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const totalM = h * 60 + m;
        const btn = document.getElementById('btn-checkin');
        
        // 4h00 đến 5h15
        const isOnTime = totalM >= 240 && totalM <= 315;
        btn.disabled = !isOnTime;
        btn.innerText = isOnTime ? "ĐIỂM DANH 🔥" : "CHƯA ĐẾN GIỜ 🔥";
    }

    loadData();
    setInterval(checkTime, 30000);
</script>
</body>
</html>
