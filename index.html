<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Nào :))</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Thẻ kính sáng */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card-done {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.1);
        }

        .btn-checkin {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3);
        }
        
        .btn-checkin:disabled { 
            background: #cbd5e1; box-shadow: none; color: #64748b;
        }

        .responsive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .responsive-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body class="p-6">
    <div id="loading-bar" class="fixed top-0 left-0 h-1 bg-blue-500 transition-all z-50" style="width: 0%"></div>

    <header class="w-full max-w-4xl mb-10 text-center">
        <h1 class="text-3xl font-black tracking-tighter uppercase mb-6 text-slate-800">
            DẬY HỌC <span class="text-blue-600">ĐÊ!!</span>
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">
            <div class="glass-card p-4 flex flex-col justify-center">
                <div id="countdown-full" class="flex justify-center gap-3 text-3xl font-black text-blue-600 tracking-tighter italic">
                    <div class="timer-unit"><span id="days">--</span><p class="text-[8px] uppercase tracking-widest text-slate-400">Ngày</p></div>
                    <span>:</span>
                    <div class="timer-unit"><span id="hours">--</span><p class="text-[8px] uppercase tracking-widest text-slate-400">Giờ</p></div>
                    <span>:</span>
                    <div class="timer-unit"><span id="mins">--</span><p class="text-[8px] uppercase tracking-widest text-slate-400">Phút</p></div>
                    <span>:</span>
                    <div class="timer-unit"><span id="secs">--</span><p class="text-[8px] uppercase tracking-widest text-slate-400">Giây</p></div>
                </div>
            </div>
            <button id="btn-checkin" onclick="doCheckIn()" class="btn-checkin py-5 rounded-3xl font-black text-xl text-white transition-all active:scale-95">
                ĐIỂM DANH 🔥
            </button>
        </div>
    </header>

    <main class="w-full max-w-5xl">
        <div id="member-list" class="responsive-grid"></div>
        <p id="sync-status" class="text-[9px] text-center font-bold text-slate-400 uppercase tracking-widest mt-8">Đang đồng bộ...</p>
    </main>

    <div id="login-screen" class="fixed inset-0 bg-white/80 backdrop-blur-xl z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter text-slate-800 mb-8">Dậy Học <span class="text-blue-500">Đê</span></h2>
            <div class="glass-card p-10 bg-white/50 border-white">
                <input type="password" id="pass-input" placeholder="MẬT MÃ" class="w-full bg-transparent border-b-2 border-slate-200 p-4 text-center text-4xl focus:border-blue-500 outline-none text-slate-800 tracking-[0.3em] mb-8 font-bold">
                <button onclick="checkLogin()" class="btn-checkin w-full py-4 rounded-2xl font-bold text-white uppercase tracking-widest">Bắt đầu</button>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://bbidkpycatwtnbgeasyw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiaWRrcHljYXR3dG5iZ2Vhc3l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjgwNDUsImV4cCI6MjA4OTg0NDA0NX0.nzRA3Me2fIch57uXzcAq5hbF9navhGw97-ykQBvdrDw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const START_DATE = new Date("2026-03-24T00:00:00");
    const DEADLINE = new Date("2026-06-10T23:59:59");
    let membersArr = []; 
    let currentUser = null;

    async function loadData() {
        try {
            const { data, error } = await supabaseClient.from('members').select('*').limit(4);
            if (error) throw error;
            membersArr = data;
            renderList();
            document.getElementById('sync-status').innerText = "Điểm danh từ 4h đến 5h15";
        } catch (e) {
            document.getElementById('sync-status').innerText = "Lỗi kết nối ❌";
        }
    }

    function renderList() {
        const list = document.getElementById('member-list');
        list.innerHTML = "";
        const now = new Date();
        const diffTime = now - START_DATE;
        const totalDaysPassed = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        const currentDayIndex = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        membersArr.forEach((m) => {
            const doneArr = Array.isArray(m.done) ? m.done : [];
            const isActiveToday = doneArr.includes(currentDayIndex);
            let xCount = 0;
            for (let i = 1; i <= totalDaysPassed; i++) {
                if (!doneArr.includes(i)) xCount++;
            }

            const card = document.createElement('div');
            card.className = `glass-card p-6 flex flex-col items-center justify-center gap-4 ${isActiveToday ? 'card-done' : ''}`;
            card.innerHTML = `
                <div class="text-[12px] font-extrabold uppercase tracking-widest text-slate-500">${m.name}</div>
                <div class="flex flex-col gap-2 w-full">
                    <div class="flex items-center justify-between bg-white/40 p-3 rounded-2xl px-5 border border-white/50">
                        <span class="text-xl">🔥</span>
                        <span class="text-2xl font-black text-orange-500">${m.streak || 0}</span>
                    </div>
                    <div class="flex items-center justify-between bg-white/40 p-3 rounded-2xl px-5 border border-white/50">
                        <span class="text-xl">❌</span>
                        <span class="text-2xl font-black text-red-500">${xCount}</span>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function updateCountdown() {
        const now = new Date();
        const diff = DEADLINE - now;
        
        if (diff <= 0) {
            document.getElementById('countdown-full').innerHTML = "FINISH! 🏆";
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('days').innerText = String(d).padStart(2, '0');
        document.getElementById('hours').innerText = String(h).padStart(2, '0');
        document.getElementById('mins').innerText = String(m).padStart(2, '0');
        document.getElementById('secs').innerText = String(s).padStart(2, '0');
    }

    function checkLogin() {
        const pass = document.getElementById('pass-input')?.value.trim();
        const user = membersArr.find(m => String(m.id) === pass);
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            setInterval(updateCountdown, 1000);
            updateCountdown();
            checkTime();
        } else { alert("Mật mã sai!"); }
    }

    async function doCheckIn() {
        if (!currentUser) return;
        const dayIndex = Math.ceil((new Date() - START_DATE) / (1000 * 60 * 60 * 24));
        if (dayIndex <= 0) return alert("Chưa đến ngày bắt đầu!");
        
        if (!Array.isArray(currentUser.done)) currentUser.done = [];
        if (!currentUser.done.includes(dayIndex)) {
            const { error } = await supabaseClient.from('members').update({ 
                done: [...currentUser.done, dayIndex], 
                streak: (currentUser.streak || 0) + 1 
            }).eq('id', currentUser.id);
            if (!error) { await loadData(); alert("Điểm danh thành công! Quá cháy 🔥"); }
        } else { alert("Hôm nay bạn đã xong rồi!"); }
    }

    function checkTime() {
        const now = new Date();
        const totalM = now.getHours() * 60 + now.getMinutes();
        const btn = document.getElementById('btn-checkin');
        const isOnTime = totalM >= 240 && totalM <= 315; 
        btn.disabled = !isOnTime;
        btn.innerText = isOnTime ? "ĐIỂM DANH 🔥" : "CHƯA TỚI GIỜ";
    }

    window.onload = () => { loadData(); setInterval(checkTime, 15000); };
</script>
</body>
</html>
